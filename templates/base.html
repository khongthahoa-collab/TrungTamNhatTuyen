<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Trung tâm Nhật Tuyền{% endblock %}</title>

  <!-- PWA: installable app metadata -->
  <link rel="manifest" href="{{ url_for('public.pwa_manifest') }}">
  <meta name="theme-color" content="#6d4dd4">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32.png') }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16.png') }}">
  <!-- iOS: Safari ignores manifest.json, needs its own meta tags -->
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Nhật Tuyền">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

<div id="page-loading-overlay" class="page-loading-overlay d-none">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Đang tải...</span>
  </div>
</div>
<style>
  .page-loading-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(255, 255, 255, 0.6);
    display: flex; align-items: center; justify-content: center;
  }
  .page-loading-overlay.d-none { display: none; }
</style>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div id="flash-container" style="position:fixed;top:70px;right:16px;z-index:9999;min-width:280px;max-width:380px;">
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat if cat != 'message' else 'info' }} alert-dismissible fade show shadow-sm" role="alert">
          {{ msg }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

{% block body %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('{{ url_for("public.pwa_service_worker") }}');
    });
  }
</script>

<!-- Nút làm mới nổi cho standalone PWA — không có thanh địa chỉ/nút reload của
     trình duyệt khi chạy từ icon màn hình chính, nên cần lối thoát thủ công. -->
<button id="pwaRefreshFab" class="btn pwa-refresh-fab d-none shadow-lg" onclick="forcePwaRefresh()" title="Làm mới">
  <i class="bi bi-arrow-clockwise fs-5"></i>
</button>
<style>
  .pwa-refresh-fab {
    position: fixed;
    bottom: 20px; /* Mặc định: Admin, Login, trang công khai — không có thanh tab dưới */
    right: 20px;
    z-index: 1050;
    width: 48px;
    height: 48px;
    border-radius: 50% !important;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none !important;
    background-color: #0f4c81 !important;
    color: #ffffff !important;
    box-shadow: 0 4px 12px rgba(15, 76, 129, 0.25);
    padding: 0 !important;
    line-height: 1;
    transition: transform 0.2s ease;
  }
  .pwa-refresh-fab:hover {
    transform: scale(1.05);
  }
  /* Giáo viên/Phụ huynh có thanh tab cố định ở đáy màn hình — nâng nút lên
     tránh đè lên thanh đó (xem body_class ở teacher/base.html, parent/base.html). */
  body.has-bottom-nav .pwa-refresh-fab {
    bottom: 84px !important;
  }
  .pwa-refresh-fab .spin-animation {
    animation: pwa-refresh-spin 0.8s linear infinite;
  }
  @keyframes pwa-refresh-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
<script>
  function isRunningStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }

  document.addEventListener('DOMContentLoaded', function() {
    if (isRunningStandalone()) {
      document.getElementById('pwaRefreshFab')?.classList.remove('d-none');
    }
  });

  function forcePwaRefresh() {
    document.querySelector('#pwaRefreshFab i')?.classList.add('spin-animation');
    const busterUrl = new URL(window.location.href);
    busterUrl.searchParams.set('cache_bypass', Date.now());
    window.location.href = busterUrl.toString();
  }
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
