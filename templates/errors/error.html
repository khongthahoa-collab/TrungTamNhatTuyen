<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ code }} · {{ title }}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --nt-primary:        #16a34a;
      --nt-primary-dark:   #15803d;
      --nt-primary-50:     #f0fdf4;
      --nt-primary-100:    #dcfce7;
      --nt-primary-200:    #bbf7d0;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--nt-primary-50);
      color: #14532d;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .error-wrap {
      width: 100%;
      max-width: 460px;
      text-align: center;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: var(--nt-primary-dark);
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 28px;
    }
    .brand:hover { color: var(--nt-primary); }
    .error-card {
      background: #ffffff;
      border: 1px solid var(--nt-primary-100);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 10px 30px -12px rgba(22, 163, 74, 0.18);
    }
    .error-icon {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--nt-primary-100);
      color: var(--nt-primary-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 20px;
    }
    .error-code {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--nt-primary);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .error-title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #14532d;
      margin: 0 0 10px;
    }
    .error-message {
      font-size: 0.95rem;
      color: #3f6b52;
      line-height: 1.6;
      margin: 0 0 28px;
    }
    .error-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-nt {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: background-color .15s ease, color .15s ease, border-color .15s ease;
    }
    .btn-nt-primary {
      background: var(--nt-primary);
      color: #fff;
    }
    .btn-nt-primary:hover { background: var(--nt-primary-dark); }
    .btn-nt-outline {
      background: transparent;
      color: var(--nt-primary-dark);
      border-color: var(--nt-primary-200);
    }
    .btn-nt-outline:hover { background: var(--nt-primary-100); }
    .error-footer {
      margin-top: 24px;
      font-size: 0.78rem;
      color: #6b8f7c;
    }
  </style>
</head>
<body>
  <div class="error-wrap">
    <a class="brand" href="{{ url_for('public.index') }}">
      <i class="bi bi-mortarboard-fill"></i>{{ center_name }}
    </a>
    <div class="error-card">
      <div class="error-icon"><i class="bi {{ icon }}"></i></div>
      <div class="error-code">Lỗi {{ code }}</div>
      <h1 class="error-title">{{ title }}</h1>
      <p class="error-message">{{ message }}</p>
      <div class="error-actions">
        {% if show_retry %}
        <button type="button" class="btn-nt btn-nt-primary" onclick="location.reload()">
          <i class="bi bi-arrow-clockwise"></i>Tải lại trang
        </button>
        <a class="btn-nt btn-nt-outline" href="{{ url_for('public.index') }}">
          <i class="bi bi-house-door"></i>Về trang chủ
        </a>
        {% else %}
        <a class="btn-nt btn-nt-primary" href="{{ url_for('public.index') }}">
          <i class="bi bi-house-door"></i>Về trang chủ
        </a>
        <button type="button" class="btn-nt btn-nt-outline" onclick="history.back()">
          <i class="bi bi-arrow-left"></i>Quay lại
        </button>
        {% endif %}
      </div>
    </div>
    <div class="error-footer">{{ center_name }}</div>
  </div>
</body>
</html>
