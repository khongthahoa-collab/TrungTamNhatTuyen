{% extends 'parent/base.html' %}
{% block content %}
<div class="container py-3" style="max-width:480px;">
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <h5 class="fw-bold mb-3"><i class="bi bi-key me-2 text-primary"></i>Đổi mật khẩu</h5>
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
          <input type="password" name="current_password" class="form-control" required autocomplete="current-password">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Mật khẩu mới</label>
          <input type="password" name="new_password" class="form-control" required minlength="6" autocomplete="new-password">
          <div class="form-text">Tối thiểu 6 ký tự.</div>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Xác nhận mật khẩu mới</label>
          <input type="password" name="confirm_password" class="form-control" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">Đổi mật khẩu</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
