version: '3.8'

services:
  web:
    build: .
    container_name: nhat-tuyen-web-prod
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: mysql+pymysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    volumes:
      - ./uploads:/app/uploads
    networks:
      - nhat-tuyen-net

  db:
    image: mysql:8.0
    container_name: nhat-tuyen-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - nhat-tuyen-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  nginx:
    image: nginx:alpine
    container_name: nhat-tuyen-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./uploads:/app/uploads:ro
    depends_on:
      - web
    restart: always
    networks:
      - nhat-tuyen-net

volumes:
  mysql_data:
    driver: local

networks:
  nhat-tuyen-net:
    driver: bridge
