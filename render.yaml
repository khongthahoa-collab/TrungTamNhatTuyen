services:
  - type: web
    name: trung-tam-nhat-tuyen
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_FOLDER
        value: uploads/documents
      - key: MAX_CONTENT_LENGTH
        value: "20971520"
